backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge"
    update: "Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge"
    delete: "Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge"
    uploadMedia: "Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge"
    deleteMedia: "Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge"
    openAuthoring: "Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge"

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

logo:
  src: "http://localhost:8080/assets/svgs/Logo.svg"
  show_in_header: false

locale: "cs"
media_folder: "src/assets/cms"
public_folder: "/assets/cms"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # ============================ #
  # =====      Ceník       ===== #
  # ============================ #
  - name: "pricelist"
    label: "Ceník"
    folder: "src/content/cenik"
    create: true
    slug: "{{service}}"
    summary: "{{service}}"
    editor:
      preview: false
    fields:
      - label: "Služba"
        name: "service"
        widget: "string"
        required: true
      - label: "Řazení"
        name: "sort"
        widget: "number"
        value_type: "int"
        default: 10
        hint: "Řazení služeb v rámci ceníku"

      - label: "Položky u této služby"
        name: "item"
        widget: "list"
        summary: "{{fields.item}} - {{fields.value}} Kč"
        fields:
          - label: "Název"
            name: "item"
            widget: "string"
            required: true

          - label: "Cena v Kč"
            name: "value"
            widget: "number"
            value_type: "int"
            required: true

          - label: "Trvání (minuty)"
            name: "duration"
            widget: "number"
            value_type: "int"
            required: false

          - label: "Popis služby"
            name: "description"
            widget: "markdown"
            modes: ["rich_text"] # Povolí pouze vizuální editor
            buttons: ["bold", "italic", "link", "bulleted-list"]
            editor_components: []
            required: false

      - label: "Zobrazení položek v seznamu"
        name: "display_list"
        widget: "boolean"
        default: false
        hint: "VYPNUTO = podrobné karty (carousel), ZAPNUTO = stručnější seznam"

  # ============================ #
  # ===== uvolněné termíny ===== #
  # ============================ #
  - name: "terminy"
    label: "Uvolněné termíny"
    folder: "src/content/terminy"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{start}}-{{end}}"
    summary: "{{date}} ({{start}} – {{end}})"
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "null" }
      - {
          label: "Permalink",
          name: "permalink",
          widget: "hidden",
          default: false,
        }
      - {
          label: "Datum",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
        }
      - {
          label: "Od",
          name: "start",
          widget: "datetime",
          format: "HH:mm",
          date_format: false,
        }
      - {
          label: "Do",
          name: "end",
          widget: "datetime",
          format: "HH:mm",
          date_format: false,
        }
      - {
          label: "Publikovat",
          name: "published",
          widget: "boolean",
          default: true,
        }
